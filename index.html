/* =========================================================
   AURORA BACKGROUND
========================================================= */
(function() {
  const canvas = document.getElementById('aurora-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const bands = [
    { y: 0.28, amp: 0.10, speed: 0.00018, phase: 0,    hue1: 160, hue2: 190, alpha: 0.22 },
    { y: 0.42, amp: 0.13, speed: 0.00013, phase: 1.5,  hue1: 140, hue2: 170, alpha: 0.18 },
    { y: 0.18, amp: 0.08, speed: 0.00022, phase: 0.8,  hue1: 170, hue2: 210, alpha: 0.15 },
    { y: 0.55, amp: 0.09, speed: 0.00010, phase: 2.3,  hue1: 150, hue2: 180, alpha: 0.14 },
    { y: 0.35, amp: 0.06, speed: 0.00028, phase: 3.1,  hue1: 180, hue2: 220, alpha: 0.10 },
  ];

  let t = 0;

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#030a0e';
    ctx.fillRect(0, 0, W, H);

    if (!draw._stars) {
      draw._stars = Array.from({length: 180}, () => ({
        x: Math.random(), y: Math.random(),
        r: Math.random() * 1.2 + 0.2,
        b: Math.random()
      }));
    }
    draw._stars.forEach(s => {
      const blink = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t * 0.002 + s.b * 20));
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H * 0.65, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,240,220,${blink * 0.7})`;
      ctx.fill();
    });

    bands.forEach(b => {
      const cy = b.y * H;
      const waveH = b.amp * H;
      const grad = ctx.createLinearGradient(0, cy - waveH * 2, 0, cy + waveH * 2);
      const hue = b.hue1 + ((b.hue2 - b.hue1) * (0.5 + 0.5 * Math.sin(t * 0.0003)));
      grad.addColorStop(0,   `hsla(${hue},100%,65%,0)`);
      grad.addColorStop(0.3, `hsla(${hue},100%,60%,${b.alpha * 0.5})`);
      grad.addColorStop(0.5, `hsla(${hue},100%,58%,${b.alpha})`);
      grad.addColorStop(0.7, `hsla(${hue + 25},100%,55%,${b.alpha * 0.5})`);
      grad.addColorStop(1,   `hsla(${hue + 25},100%,50%,0)`);

      ctx.beginPath();
      ctx.moveTo(0, cy);
      const steps = 80;
      for (let i = 0; i <= steps; i++) {
        const x = (i / steps) * W;
        const wave =
          Math.sin(x * 0.004 + t * b.speed + b.phase) * waveH * 0.6 +
          Math.sin(x * 0.009 - t * b.speed * 1.3 + b.phase * 2) * waveH * 0.3 +
          Math.sin(x * 0.002 + t * b.speed * 0.7) * waveH * 0.1;
        ctx.lineTo(x, cy + wave);
      }
      ctx.lineTo(W, cy + waveH * 2.5);
      ctx.lineTo(0, cy + waveH * 2.5);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
    });

    const topGrad = ctx.createRadialGradient(W * 0.5, -H * 0.1, 0, W * 0.5, -H * 0.1, W * 0.8);
    topGrad.addColorStop(0, `rgba(0,180,140,0.09)`);
    topGrad.addColorStop(1, `rgba(0,0,0,0)`);
    ctx.fillStyle = topGrad;
    ctx.fillRect(0, 0, W, H);

    t++;
    requestAnimationFrame(draw);
  }
  draw();
})();

let activeProvider = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showSlotResult(provider) {
  activeProvider = provider;
  const games = shuffle(providers[provider]).slice(0, 5);

  document.getElementById('resultTitle').innerHTML =
    `🔥INFO ${provider.toUpperCase()} GACOR HARI INI🔥`;

  const list = document.getElementById('gameList');
  list.innerHTML = games.map(g =>
    `<div class="game-item"><span class="icon">📢</span>${g}</div>`
  ).join('');

  const box = document.getElementById('resultBox');
  box.style.display = 'block';
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // AUTO COPY
  const textToCopy =
    `🔥INFO ${provider.toUpperCase()} GACOR HARI INI🔥\n\n` +
    games.map((g, i) => `${i + 1}. ${g}`).join('\n');

  navigator.clipboard.writeText(textToCopy).then(() => {
    showToast('✅ Done Wak!', 'success');
  }).catch(() => {
    showToast('⚠️ Format slot berhasil dibuat.', 'warning');
  });
}

// Build provider grid
const grid = document.getElementById('providerGrid');
Object.keys(providers).forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'provider-btn';
  btn.textContent = p;
  btn.onclick = () => {
    document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    showSlotResult(p);
  };
  grid.appendChild(btn);
});

document.getElementById('regenBtn').onclick = () => {
  if (activeProvider) showSlotResult(activeProvider);
};

/* =========================================================
   TOGEL LOGIC
========================================================= */
const shioList = ['KUDA','ULAR','NAGA','KELINCI','HARIMAU','KERBAU','TIKUS','BABI','ANJING','AYAM','MONYET','KAMBING'];

function getRandomNumber(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function generateRandomNumbers(count, min, max) {
  min = (min === undefined) ? 1 : min;
  max = (max === undefined) ? 9 : max;
  const n = [];
  for (let i = 0; i < count; i++) n.push(getRandomNumber(min, max));
  return n;
}

function generatePairs(count) {
  const p = [];
  for (let i = 0; i < count; i++) p.push('' + getRandomNumber(0,9) + getRandomNumber(0,9));
  return p;
}

function getCurrentDate() {
  const now = new Date();
  return String(now.getDate()).padStart(2,'0') + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + now.getFullYear();
}

function getRandomShio() { return shioList[Math.floor(Math.random() * shioList.length)]; }

function generateTogelPrediction(marketName) {
  const tanggal = getCurrentDate();
  const angkaMain = generateRandomNumbers(4).join(' ');
  const bbfs = generateRandomNumbers(5).join(' ');
  const shio = getRandomShio();
  const colokAngka = generateRandomNumbers(2).join(' ');
  const top2d = [];
  for (let i = 0; i < 5; i++) top2d.push(generatePairs(5).join(' '));
  const angkaPanas = generatePairs(3).join(' ');
  return 'Prediksi Togel - ' + marketName + ' -\nTANGGAL  ' + tanggal + '\nANGKA MAIN : ' + angkaMain + '\nBBFS : ' + bbfs + '\nSHIO : ' + shio + '\nCOLOK ANGKA : ' + colokAngka + '\n \nTOP 2D :\n' + top2d[0] + ' \n' + top2d[1] + ' \n' + top2d[2] + ' \n' + top2d[3] + ' \n' + top2d[4] + '\n \nANGKA PANASNYA : ' + angkaPanas;
}

function generate(number, evt) {
  const names = {1:'TOTO WUHAN',2:'HONGKONG SIANG',3:'SYDNEY POOLS',4:'TAIPING POOLS',5:'SINGAPORE POOLS',6:'MALAYSIA POOLS',7:'ETAWAH POOLS',8:'HONGKONG POOLS'};
  const outputBox = document.getElementById('outputBox');
  const button = evt.target.closest('.gen-button');
  button.disabled = true;
  const originalHTML = button.innerHTML;
  button.innerHTML = '<span>Bentar.. <span class="loading"></span></span>';

  setTimeout(function() {
    try {
      const result = generateTogelPrediction(names[number]);
      outputBox.classList.add('animating');
      outputBox.textContent = result;
      outputBox.classList.remove('empty');
      outputBox.classList.add('has-content');
      setTimeout(function() { outputBox.classList.remove('animating'); }, 500);
      navigator.clipboard.writeText(result).then(function() {
        showToast('✅ ' + names[number] + ' - Done wak!', 'success');
      }).catch(function() {
        showToast('⚠️ ' + names[number] + ' - Prediksi berhasil!', 'warning');
      });
    } catch(err) {
      outputBox.textContent = 'Error: ' + err.message;
      showToast('❌ Terjadi kesalahan!', 'error');
    }
    button.disabled = false;
    button.innerHTML = originalHTML;
  }, 800);
}

function showToast(message, type) {
  type = type || 'success';
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.style.background = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#f59e0b';
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 3000);
}
